<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chess Game</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            background-color: #f0f0f0; /* A light background for contrast */
        }
        .game-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            background-color: #fff;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
            border-radius: 8px;
        }
        #board {
            display: grid;
            grid-template-columns: repeat(8, 70px);
            grid-template-rows: repeat(8, 70px);
            width: 560px; /* 8 * 70px */
            height: 560px; /* 8 * 70px */
            border: 5px solid #333;
            margin-bottom: 20px;
        }
        .square {
            width: 70px;
            height: 70px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 50px; /* For piece representation */
        }
        .light {
            background-color: #f0d9b5;
        }
        .dark {
            background-color: #b58863;
        }
        .piece {
            cursor: pointer;
            /* Styles for pieces will be minimal here as actual pieces might be SVGs or unicode */
            text-align: center;
            line-height: 70px; /* Vertically center unicode characters if used */
        }
        .selected {
            border: 3px solid yellow;
            box-sizing: border-box; /* Ensure border doesn't increase size */
        }
        #game-status {
            margin-bottom: 15px;
            font-size: 1.2em;
            font-weight: bold;
            min-height: 1.5em; /* Reserve space */
        }
        #game-controls {
            display: flex;
            gap: 10px; /* Space between buttons */
        }
        #game-controls button {
            padding: 10px 15px;
            font-size: 1em;
            cursor: pointer;
            border: 1px solid #ccc;
            border-radius: 4px;
            background-color: #e7e7e7;
        }
        #game-controls button:hover {
            background-color: #ddd;
        }
    </style>
</head>
<body>
    <div class="game-container">
        <div id="game-status"></div>
        <div id="board">
            <!-- Squares will be generated by JavaScript -->
        </div>
        <div id="game-controls">
            <button id="play-human">Play vs. Human</button>
            <button id="play-ai">Play vs. AI</button>
            <button id="reset-game">Reset Game</button>
        </div>
    </div>
    <script></script>
</body>
</html>
